kind = "web"
previewPath = "/"
title = "NATBERRY 16 — Gestion Commandes & Stock"
version = "1.0.0"
id = "artifacts/natberry"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18759

[services.development]
run = "pnpm --filter @workspace/natberry run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/natberry", "run", "build" ]
publicDir = "artifacts/natberry/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18759"
BASE_PATH = "/"
